configuration:
  mqtt_host:
    name: MQTT Host
    description: "Hostname of the MQTT broker. Default is the internal Mosquitto add-on."
  mqtt_port:
    name: MQTT Port
    description: "Port of the MQTT broker."
  mqtt_user:
    name: MQTT User
    description: "Username for MQTT authentication (leave empty if not required)."
  mqtt_password:
    name: MQTT Password
    description: "Password for MQTT authentication (leave empty if not required)."
  scan_interval_seconds:
    name: Scan Interval
    description: "Seconds between each camera snapshot analysis (1-30)."
  min_confidence:
    name: Minimum Confidence
    description: "Minimum confidence threshold to consider a face as recognized (0.1-1.0)."
  face_detection_model:
    name: Detection Model
    description: "Face detection model. 'hog' is faster, 'cnn' is more accurate but slower."
  log_level:
    name: Log Level
    description: "Logging verbosity level."
